<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08aeea"/>
      <stop offset="0.52" stop-color="#11b8ee"/>
      <stop offset="1" stop-color="#008fd4"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>

  <g filter="url(#blur)" opacity="0.78">
    <ellipse cx="250" cy="760" rx="380" ry="190" fill="#ffffff"/>
    <ellipse cx="690" cy="120" rx="360" ry="150" fill="#ffffff"/>
    <ellipse cx="1050" cy="780" rx="420" ry="180" fill="#ffffff"/>
    <ellipse cx="1470" cy="190" rx="300" ry="150" fill="#d9f7ff"/>
  </g>

  <g filter="url(#blur)" opacity="0.35">
    <ellipse cx="80" cy="250" rx="260" ry="150" fill="#73dcff"/>
    <ellipse cx="1320" cy="620" rx="360" ry="180" fill="#6edcff"/>
  </g>
</svg>
